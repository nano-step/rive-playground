<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>
  <g stroke="#e8e8e8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main vertical stroke of R — thick, confident, slight taper -->
    <path d="M152 390 C151 388 150 200 152 122 C152 118 154 115 156 114"
      stroke-width="28" opacity="0.95"/>
    <!-- Slight overshoot at top -->
    <path d="M150 122 C149 116 148 112 150 108"
      stroke-width="18" opacity="0.5"/>

    <!-- Bowl of R — elegant curve -->
    <path d="M156 118 C160 112 200 104 260 106 C310 108 344 122 350 150 C356 178 344 208 310 218 C286 224 248 226 220 224 C192 222 168 218 158 216"
      stroke-width="24" opacity="0.92"/>

    <!-- Junction detail — ink pooling effect -->
    <path d="M158 214 C160 218 162 220 160 224"
      stroke-width="30" opacity="0.6"/>

    <!-- Leg of R — dynamic diagonal with flair -->
    <path d="M218 220 C230 240 270 290 310 340 C330 365 348 382 360 396"
      stroke-width="22" opacity="0.9"/>
    <!-- Leg end flick -->
    <path d="M358 394 C364 400 370 404 378 406"
      stroke-width="14" opacity="0.55"/>

    <!-- Pencil texture strokes — subtle cross-hatching -->
    <path d="M165 140 C170 138 190 134 210 133" stroke-width="3" opacity="0.15"/>
    <path d="M168 160 C175 158 200 155 230 154" stroke-width="3" opacity="0.12"/>
    <path d="M170 180 C178 178 205 176 240 175" stroke-width="3" opacity="0.1"/>
    <path d="M165 280 C166 300 166 320 165 340" stroke-width="4" opacity="0.08"/>

    <!-- Pencil grain dots -->
    <circle cx="180" cy="130" r="1.5" fill="#e8e8e8" opacity="0.12"/>
    <circle cx="300" cy="150" r="1.5" fill="#e8e8e8" opacity="0.1"/>
    <circle cx="260" cy="210" r="1.5" fill="#e8e8e8" opacity="0.08"/>
    <circle cx="280" cy="300" r="1.5" fill="#e8e8e8" opacity="0.1"/>
    <circle cx="340" cy="370" r="1.5" fill="#e8e8e8" opacity="0.12"/>

    <!-- Subtle shadow under bowl -->
    <path d="M200 228 C230 232 270 230 300 224"
      stroke-width="6" opacity="0.06"/>
